
<!DOCTYPE html>
<html>
<head>

<title>NEXAH Visual Navigator</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 40px;
}

h1 {
    margin-bottom: 30px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 30px;
}

    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
}

img {
    max-width: 100%;
}

</style>
</head>

<body>

<h1>NEXAH Visual Navigator</h1>

<div class="gallery">


<div class="item">
    <h3>cfg/cfg_demo.png</h3>
    <img src="cfg/cfg_demo.png" />
</div>

<div class="item">

</div>


</div>

</html>
